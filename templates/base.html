<!doctype html>
<html lang="ru">
<head>

    <meta charset="utf-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>{% block title %}Электролаборатория{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

:root{

    --bg:#eef3f8;

    --panel:#ffffff;

    --line:#d7dee8;

    --text:#0f172a;

    --muted:#64748b;

    --accent:#009999;

    --accent2:#0078d4;

    --success:#16a34a;

    --warning:#d97706;

    --danger:#dc2626;

}

body{

    background:linear-gradient(135deg,#eef3f8,#dde7f2);

    color:var(--text);

    font-family:Inter,Segoe UI,sans-serif;

    min-height:100vh;

}

.container{

    max-width:1700px;

}

.page-title{

    font-size:32px;

    font-weight:700;

    margin-bottom:24px;

}

.kpi-grid{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));

    gap:20px;

    margin-bottom:28px;

}

.kpi-card{

    position:relative;

    overflow:hidden;

    background:white;

    border-radius:24px;

    padding:24px;

    border:1px solid rgba(15,23,42,.06);

    box-shadow:0 10px 30px rgba(15,23,42,.05);

}

.kpi-card::before{

    content:'';

    position:absolute;

    top:0;

    left:0;

    width:5px;

    height:100%;

    background:linear-gradient(180deg,#009999,#0078d4);

}

.kpi-title{

    font-size:13px;

    text-transform:uppercase;

    color:#64748b;

    margin-bottom:10px;

    font-weight:700;

}

.kpi-value{

    font-size:42px;

    font-weight:800;

}

.kpi-sub{

    color:#64748b;

}

.glass-card{

    background:#ffffff;

    border-radius:24px;

    box-shadow:0 10px 40px rgba(15,23,42,.06);

}

.card-header{

    background:transparent !important;

    border-bottom:1px solid var(--line);

    font-weight:600;

    color:#0f172a;

}

.table-wrapper{

    border-radius:22px;

    overflow:hidden;

}

.table thead{

    background:#f8fafc;

}

.table thead th{

    border:none;

    padding:18px;

    font-size:12px;

    text-transform:uppercase;

}

.table tbody td{

    padding:18px;

    vertical-align:middle;

}

.btn-industrial{

    background:linear-gradient(
            135deg,
            #009999,
            #0078d4
    );

    border:none;

    border-radius:14px;

    color:white;

    padding:10px 18px;

}

.btn-industrial:hover{

    color:white;

    transform:translateY(-1px);

}

.form-control{

    background:#f8fafc;

    border:1px solid var(--line);

    color:#0f172a;

    border-radius:14px;

    min-height:46px;

}

.status,.badge-status{

    padding:8px 14px;

    border-radius:999px;

    display:inline-flex;

    align-items:center;

    gap:8px;

    font-size:12px;

    font-weight:700;

}

.status-ok{background:#dcfce7;color:#166534;}
.status-warning{background:#fef3c7;color:#92400e;}
.status-danger{background:#fee2e2;color:#991b1b;}

.top-toolbar{

    display:flex;

    justify-content:space-between;

    align-items:center;

    gap:20px;

    flex-wrap:wrap;

}

.expand-btn{

    width:34px;

    height:34px;

    border:none;

    border-radius:10px;

    background:#f1f5f9;

    color:#334155;

}

.info-grid{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));

    gap:18px;

}

.info-card{

    background:white;

    border:1px solid #e2e8f0;

    border-radius:18px;

    padding:18px;

}

.info-label{

    font-size:12px;

    text-transform:uppercase;

    letter-spacing:.6px;

    color:#64748b;

    margin-bottom:8px;

    font-weight:700;

}

.info-value{

    font-size:14px;

    color:#0f172a;

    font-weight:600;

    word-break:break-word;

}

.expired-row{animation:expiredPulse 2.4s infinite;}
.written-row{opacity:.55;background:#f1f5f9 !important;}
.qrcode canvas,.qrcode img{image-rendering:pixelated;}

@keyframes expiredPulse{
    50%{box-shadow:inset 4px 0 0 #dc2626,0 0 22px rgba(220,38,38,.30);}
}

.dataTables_filter input,
.dataTables_length select{

    border-radius:12px !important;

    border:1px solid #d7dee8 !important;

    min-height:42px;

}

.pagination .page-link{

    border-radius:10px;

    margin:0 3px;

}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Электролаборатория</a>
        <div class="navbar-nav flex-row gap-2">
            <a class="nav-link" href="/">Протоколы</a>
            <a class="nav-link" href="/instruments">Средства измерений</a>
            <a class="nav-link" href="/logs">Журнал действий</a>
        </div>
    </div>
</nav>

<div class="container py-4">

    {% block content %}{% endblock %}

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

{% block scripts %}{% endblock %}

</body>
</html>
