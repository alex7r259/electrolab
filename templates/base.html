<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Реестр протоколов</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        :root{--bg:#eef3f8;--line:#d7dee8;--text:#0f172a;--muted:#64748b;--accent:#009999;--accent2:#0078d4;}
        body{margin:0;background:linear-gradient(135deg,#eef3f8,#dde7f2);color:var(--text);font-family:Inter,Segoe UI,sans-serif;min-height:100vh;}
        .container{max-width:1700px;}
        .page-title{font-size:32px;font-weight:700;margin-bottom:24px;}
        .glass-card{background:#fff;border:1px solid rgba(15,23,42,.06);border-radius:24px;box-shadow:0 10px 40px rgba(15,23,42,.06),0 2px 6px rgba(15,23,42,.04);}
        .table-wrapper{border-radius:22px;overflow:hidden;border:1px solid rgba(15,23,42,.06);}
        .table{color:#0f172a;margin:0;}
        .table thead{background:linear-gradient(90deg,#f8fafc,#eef3f8);}
        .table thead th{border:none;padding:20px 18px;color:#334155;font-size:12px;text-transform:uppercase;letter-spacing:1px;font-weight:700;}
        .table tbody td{border-top:1px solid #eef2f7;padding:16px;vertical-align:middle;font-size:14px;white-space:nowrap;}
        .table tbody tr{background:#fff;transition:.18s;}
        .table tbody tr:hover{background:#f8fbff;}
        .btn-industrial{background:linear-gradient(135deg,#009999,#0078d4);border:none;border-radius:14px;min-height:46px;color:#fff;font-weight:600;padding:0 18px;}
        .btn-industrial:hover{transform:translateY(-1px);color:#fff;}
        .top-toolbar{display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;}
        .dataTables_filter input,.dataTables_length select{background:#fff!important;border:1px solid var(--line)!important;color:#0f172a!important;border-radius:12px!important;min-height:42px;}
    </style>
</head>
<body>
<div class="container py-4">
    {% block content %}{% endblock %}
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
