{% extends 'base.html' %}

{% block content %}

<h3 class="mb-4">Редактирование</h3>

<form method="POST" class="card card-body bg-white shadow-sm">

    <div class="mb-3">
        <label class="form-label">Номер протокола</label>
        <input
            type="text"
            class="form-control"
            value="{{ protocol.protocol_number }}"
            disabled
        >
    </div>

    <div class="mb-3">
        <label class="form-label">Название протокола</label>
        <input
            type="text"
            name="protocol_name"
            class="form-control"
            value="{{ protocol.protocol_name }}"
        >
    </div>

    <div class="mb-3">
        <label class="form-label">Объект</label>
        <input
            type="text"
            name="object_name"
            class="form-control"
            value="{{ protocol.object_name }}
